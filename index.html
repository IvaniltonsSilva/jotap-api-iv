<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidade do Jota</title>

    <script>

    <style>
        :root {
            --primary: #00ff88;
            --accent: #ff0000;
            --bg: #020202;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }

        body {
            background-color: var(--bg);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* LINHAS DE FUNDO */
        .bg-lines {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 10% 100%;
            pointer-events: none;
        }

        .bg-lines::after {
            content: "";
            position: absolute;
            top: -100%; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(0, 255, 136, 0.1), transparent);
            animation: moveLines 6s linear infinite;
        }

        @keyframes moveLines {
            0% { transform: translateY(0%); }
            100% { transform: translateY(200%); }
        }

        /* CONTAINER */
        .lp-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 60px 20px;
            background: 
                radial-gradient(circle at center, rgba(2, 2, 2, 0.2) 0%, var(--bg) 90%),
                url('jp-direto.jpg') center/cover no-repeat fixed;
        }

        /* ODD BOX */
        .odd-multiplier-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            padding: 30px 40px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
            text-align: center;
        }

        .odd-label { font-size: 12px; text-transform: uppercase; color: #888; letter-spacing: 3px; display: block; margin-bottom: 10px; }
        #multiplier { font-size: 80px; font-weight: 900; line-height: 1; }
        .odd-x { color: var(--accent); font-size: 40px; }

        .headline { font-size: 28px; font-weight: 900; text-transform: uppercase; text-align: center; margin-top: 20px; }

        /* --- BOTÃO FIXADO --- */
        .btn-container {
            width: 100%;
            max-width: 350px;
            margin-bottom: 30px;
            position: relative;
            z-index: 50; /* Garante que está no topo */
        }

        /* O efeito de borda brilhante */
        .btn-border-beam {
            position: relative;
            padding: 2px;
            border-radius: 18px;
            overflow: hidden;
            display: block;
            text-decoration: none;
        }

        .btn-border-beam::before {
            content: "";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, var(--primary), transparent);
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .btn-content {
            position: relative;
            background: #0a0a0a;
            color: #fff;
            padding: 22px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            display: block;
            z-index: 5;
            text-align: center;
            transition: 0.3s;
        }

        .btn-border-beam:hover .btn-content {
            background: #111;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        }
    </style>
</head>
<body>

    <div class="bg-lines"></div>

    <div class="lp-wrapper">
        
        <header>
            <div class="odd-multiplier-box">
                <span class="odd-label">Multiplicador Atual</span>
                <span id="multiplier">1.00</span><span class="odd-x">x</span>
            </div>
            <h1 class="headline">BILHETE DO DIA <br><span style="color: var(--primary)">LIBERADO</span></h1>
        </header>

        <div class="btn-container">
            <a href="https://mais.red/run/ivc-comunidade" class="btn-border-beam" onclick="trackClick()">
                <span class="btn-content">
                    🔥 ACESSAR BILHETE AGORA
                </span>
            </a>
        </
            </div>
        </div>

    </div>

    <script>
    function animateOdd() {
        const display = document.getElementById('multiplier');
        const oddX = document.querySelector('.odd-x');
        let current = 1.00;
        const target = 100.00;
        const duration = 3000; 
        const startTime = performance.now();

        function update(currentTime) {
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);
            const easeOut = 1 - Math.pow(1 - progress, 4);
            current = 1 + (target - 1) * easeOut;
            display.innerText = current.toFixed(2);
            if (current >= 95) {
                display.style.color = "#00ff88"; 
                display.style.textShadow = "0 0 30px rgba(0, 255, 136, 0.8)";
                oddX.style.color = "#00ff88";
            }
            if (progress < 1) requestAnimationFrame(update);
        }
        requestAnimationFrame(update);
    }
    window.onload = animateOdd;

    function trackClick() {
        fbq('track', 'Lead');
    }
    </script>

</body>
</html>
