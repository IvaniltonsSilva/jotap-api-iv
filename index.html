<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunidade do Jota - Jogos do Dia</title>

    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00ff88;
            --bg: #020202;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
    
        body, html {
            height: 100%;
            background-color: var(--bg);
            color: #fff;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        /* CONTAINER PRINCIPAL */
        .lp-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end; /* Empurra o conteúdo para perto do rodapé */
            padding-bottom: 30px;
            background: 
                radial-gradient(circle at center, rgba(2, 2, 2, 0.4) 0%, var(--bg) 95%),
                url('DSC08016.jpg.jpeg') center/cover no-repeat fixed;
        }

        /* SEÇÃO TOPO (CARROSSEL FIXO NO TOPO) */
        .header-section { 
            width: 100%; 
            text-align: center; 
            position: absolute; 
            top: 20px; 
        }
        
        .section-label { 
            font-size: 10px; 
            text-transform: uppercase; 
            color: var(--primary); 
            letter-spacing: 3px; 
            margin-bottom: 10px;
            font-weight: bold;
        }

        .carousel-container { display: flex; width: 100%; overflow: hidden; padding-bottom: 10px; }
        .carousel-track { display: flex; gap: 10px; animation: scroll 25s linear infinite; padding-left: 15px; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .game-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            min-width: 150px;
            padding: 8px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .teams-row { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .team img { width: 28px; height: 28px; object-fit: contain; }
        .team span { font-size: 9px; font-weight: bold; display: block; margin-top: 2px;}
        .vs { font-size: 12px; color: var(--primary); font-weight: 900; }

        /* BILHETE LIBERADO - APROXIMADO */
        .headline { 
            font-family: 'Bebas Neue', sans-serif; 
            text-transform: uppercase; 
            line-height: 0.85; 
            text-align: center;
            margin-bottom: -10px; /* Margem negativa para colar na caixa de aviso */
            z-index: 2;
        }

        .headline span:first-child { font-size: clamp(60px, 18vw, 85px); display: block; }
        .headline span:last-child { font-size: clamp(45px, 14vw, 65px); color: var(--primary); display: block; }

        /* FOOTER (AVISO E BOTÃO) */
        .footer-section { 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 0 20px; 
            z-index: 1;
        }

        .alert-box {
            width: 100%;
            max-width: 350px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
        }

        .alert-box p { font-size: 13px; color: #d1d1d1; text-align: center; line-height: 1.4; }
        .alert-box span { color: #ff8800; font-weight: bold; margin-right: 4px; }

        .btn-container { width: 100%; max-width: 350px; position: relative; animation: pulse 2s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        .btn-border-beam {
            position: relative; padding: 2px; border-radius: 11px; overflow: hidden; display: block; text-decoration: none;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.2);
        }

        .btn-border-beam::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, var(--primary), transparent);
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .btn-content {
            position: relative; 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff; 
            padding: 18px; 
            border-radius: 9px;
            font-size: 18px; 
            font-weight: 900; 
            text-transform: uppercase; 
            display: block; 
            z-index: 5; 
            text-align: center;
        }

    </style>
</head>
<body>

    <div class="lp-wrapper">
        
        <div class="header-section">
            <p class="section-label">Jogos do Dia</p>
            <div class="carousel-container">
                <div class="carousel-track">
                    <div class="game-card">
                        <div class="teams-row">
                            <div class="team"><img src="Mirassol-SP HD.png"><span>ATHLETICO</span></div>
                            <div class="vs">VS</div>
                            <div class="team"><img src="https://crests.football-data.org/1770.png"><span>BOTAFOGO</span></div>
                        </div>
                    </div>
                    <div class="game-card">
                        <div class="teams-row">
                            <div class="team"><img src="Internacional.png"><span>INTER</span></div>
                            <div class="vs">VS</div>
                            <div class="team"><img src="https://crests.football-data.org/1776.png"><span>SÃO PAULO</span></div>
                        </div>
                    </div>
                    <div class="game-card">
                        <div class="teams-row">
                            <div class="team"><img src="https://crests.football-data.org/1765.png"><span>FLU</span></div>
                            <div class="vs">VS</div>
                            <div class="team"><img src="https://crests.football-data.org/1779.png"><span>CORINTHIANS</span></div>
                        </div>
                    </div>
                    <div class="game-card">
                        <div class="teams-row">
                            <div class="team"><img src="Mirassol-SP HD.png"><span>ATHLETICO</span></div>
                            <div class="vs">VS</div>
                            <div class="team"><img src="https://crests.football-data.org/1770.png"><span>BOTAFOGO</span></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <h1 class="headline"> 
            <span>BILHETE</span> 
            <span>LIBERADO</span> 
        </h1>

        <div class="footer-section">
            <div class="alert-box">
                <p><span>*</span> Entre agora na comunidade, em breve vou mandar uma oportunidade para forrarmos juntos!</p>
            </div>
              
            <div class="btn-container">
                <a href="https://mais.red/run/ivc-comunidade" class="btn-border-beam" onclick="trackClick()">
                    <span class="btn-content">🔥 ENTRAR NA COMUNIDADE</span>
                </a>
            </div>
        </div>
    </div>

    <script>
    function trackClick() {
        fbq('track', 'Lead');
    }
    </script>

</body>
</html>
