<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunidade do Jota</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:ital,wght@1,900&display=swap');
        
        :root { --primary: #00ff88; --bg: #020202; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html { 
            height: 100%; 
            background: #000; 
            overflow: hidden; 
            font-family: 'Arial', sans-serif; 
        }

        /* FUNDO COM IMAGEM LIBERADA NO TOPO */
        .wrapper {
            position: relative;
            width: 100%;
            height: 100vh;
            /* Overlay mais suave (0.5) para a foto aparecer melhor */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), url('jp-direto.jpg') center/cover no-repeat;
        }

        /* 1. JOGOS NO TOPO (DISCRETO) */
        .top-section {
            position: absolute;
            top: 25px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .game-tag {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 8px 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 2. TEXTO "BILHETE LIBERADO" BEM MAIS EM BAIXO */
        .headline {
            position: absolute;
            top: 65%; /* DESCEU O TEXTO PARA LIBERAR A FOTO */
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Kanit', sans-serif;
            font-size: clamp(45px, 12vw, 60px);
            line-height: 0.85;
            text-align: center;
            width: 100%;
            font-style: italic;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* 3. GRUPO DE BAIXO (AVISO + BOTÃO) */
        .footer-group {
            position: absolute;
            bottom: 25px; /* PERTO DO RODAPÉ */
            width: 100%;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .alert-box {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            font-size: 13px;
            color: #fff;
            text-align: center;
            margin-bottom: 15px;
            max-width: 380px;
        }

        .alert-box span { color: var(--primary); font-weight: bold; }

        /* BOTÃO COM ANIMAÇÃO DE BORDA */
        .btn-container { width: 100%; max-width: 380px; }
        
        .btn-glow {
            position: relative; padding: 2px; border-radius: 15px; overflow: hidden; display: block; text-decoration: none;
        }

        .btn-glow::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, var(--primary), transparent);
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .btn-inner {
            position: relative; background: #000; color: #fff; padding: 18px; border-radius: 13px;
            font-size: 18px; font-weight: 900; text-transform: uppercase; text-align: center; z-index: 5;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

    </style>
</head>
<body>

    <div class="wrapper">
        
        <div class="top-section">
            <p style="color: var(--primary); font-size: 11px; letter-spacing: 3px; margin-bottom: 8px; font-weight: bold;">JOGOS DO DIA</p>
            <div class="game-tag">
                <img src="https://crests.football-data.org/1776.png" width="20">
                <span style="color: #fff; font-size: 12px; font-weight: bold;">INTER VS SÃO PAULO</span>
            </div>
        </div>

        <h1 class="headline">BILHETE<br><span style="color: var(--primary)">LIBERADO</span></h1>

        <div class="footer-group">
            <div class="alert-box">
                <p><span>*</span> Entre agora na comunidade, em breve vou mandar uma oportunidade para forrarmos juntos!</p>
            </div>

            <div class="btn-container">
                <a href="https://mais.red/run/ivc-comunidade" class="btn-glow">
                    <div class="btn-inner">🔥 PEGAR BILHETE</div>
                </a>
            </div>
        </div>

    </div>

</body>
</html>
