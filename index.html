    <style>
        :root {
            --primary: #00ff88;
            --accent: #ff0000;
            --bg: #020202;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }

        body {
            background-color: var(--bg);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* LINHAS DE FUNDO */
        .bg-lines {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 10% 100%;
            pointer-events: none;
        }

        .bg-lines::after {
            content: "";
            position: absolute;
            top: -100%; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(0, 255, 136, 0.1), transparent);
            animation: moveLines 6s linear infinite;
        }

        @keyframes moveLines {
            0% { transform: translateY(0%); }
            100% { transform: translateY(200%); }
        }

        /* CONTAINER PRINCIPAL */
        .lp-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 50px 0;
            background: 
                radial-gradient(circle at center, rgba(2, 2, 2, 0.1) 0%, var(--bg) 90%),
                url('jp-direto.jpg') center/cover no-repeat fixed;
        }

        .header-section { width: 100%; text-align: center; overflow: hidden; }
        
        .section-label { 
            font-size: 12px; 
            text-transform: uppercase; 
            color: var(--primary); 
            letter-spacing: 4px; 
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* CARROSSEL DE JOGOS */
        .carousel-container {
            display: flex;
            width: 100%;
            overflow: hidden;
            padding: 10px 0;
        }

        .carousel-track {
            display: flex;
            gap: 20px;
            animation: scroll 25s linear infinite;
            padding-left: 20px;
        }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .game-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            min-width: 260px;
            padding: 20px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .league-name {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: block;
        }

        .teams-row {
            display: flex;
            align-items: center;
            justify-content: space-around;
            gap: 10px;
        }

        .team { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
        .team img { width: 45px; height: 45px; object-fit: contain; }
        .team span { font-size: 12px; font-weight: bold; color: #fff; white-space: nowrap; }
        .vs { font-weight: 900; color: var(--primary); font-size: 18px; }

        .headline { font-size: 26px; font-weight: 900; text-transform: uppercase; margin-top: 50px; line-height: 1; padding: 0 20px;}

        /* BOTÃO E RODAPÉ */
        .footer-section { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 0 20px; }

        .btn-container { width: 100%; max-width: 350px; margin-bottom: 30px; position: relative; }
        
        .btn-border-beam {
            position: relative; padding: 2px; border-radius: 18px; overflow: hidden; display: block; text-decoration: none;
        }

        .btn-border-beam::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, var(--primary), transparent);
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .btn-content {
            position: relative; background: #0a0a0a; color: #fff; padding: 22px; border-radius: 16px;
            font-size: 18px; font-weight: 900; text-transform: uppercase; display: block; z-index: 5; text-align: center;
        }

        .social-proof { display: flex; align-items: center; gap: 12px; background: rgba(255, 255, 255, 0.05); padding: 10px 20px; border-radius: 100px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .avatars img { width: 30px; height: 30px; border-radius: 50%; border: 2px solid #000; margin-left: -12px; }
        .avatars img:first-child { margin-left: 0; }
        .proof-text { font-size: 11px; color: #ccc; font-weight: 600; }

    </style>
</head>
