<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunidade do Jota - Jogos do Dia</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,900;1,900&display=swap');

        :root {
            --primary: #00ff88;
            --bg: #020202;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #fff;
            overflow: hidden;
            height: 100vh;
            font-family: 'Arial', sans-serif;
        }

        /* FUNDO COM IMAGEM FIXA */
        .lp-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: 
                linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)),
                url('jp-direto.jpg') center/cover no-repeat;
            padding-top: 20px;
        }

        .header-section { width: 100%; text-align: center; }
        
        .section-label { 
            font-size: 11px; 
            text-transform: uppercase; 
            color: var(--primary); 
            letter-spacing: 3px; 
            margin-bottom: 15px;
            font-weight: bold;
        }

        /* CARROSSEL */
        .carousel-container { display: flex; width: 100%; overflow: hidden; margin-bottom: 20px; }
        .carousel-track { display: flex; gap: 10px; animation: scroll 20s linear infinite; padding-left: 10px; }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .game-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            min-width: 180px;
            padding: 12px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .teams-row { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .team { display: flex; flex-direction: column; align-items: center; }
        .team img { width: 35px; height: 35px; object-fit: contain; }
        .team span { font-size: 10px; font-weight: bold; margin-top: 4px; }
        .vs { font-weight: 900; color: var(--primary); font-size: 12px; }

        /* TEXTO CENTRAL - MAIS EM BAIXO */
        .headline { 
            font-family: 'Kanit', sans-serif;
            font-size: 50px; 
            font-weight: 900; 
            font-style: italic;
            text-transform: uppercase; 
            margin-top: 40px; /* Ajuste para descer o texto do topo */
            line-height: 0.85;
            text-align: center;
            letter-spacing: -2px;
        }

        /* CONTAINER DO RODAPÉ - SUBIR TUDO */
        .footer-section { 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 0 20px;
            margin-top: 30px; /* Espaço entre o Bilhete Liberado e a Caixa */
        }

        .alert-box {
            width: 100%;
            max-width: 350px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px; /* Espaço para o botão */
        }

        .alert-box p { font-size: 12px; color: #fff; line-height: 1.3; text-align: center; }
        .alert-box span { color: #ffaa00; font-weight: bold; }

        /* BOTÃO ORIGINAL */
        .btn-container { width: 100%; max-width: 350px; }

        .btn-border-beam {
            position: relative; padding: 2px; border-radius: 15px; overflow: hidden; display: block; text-decoration: none;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        .btn-border-beam::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, var(--primary), transparent);
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .btn-content {
            position: relative; background: #000; color: #fff; padding: 18px; border-radius: 13px;
            font-size: 17px; font-weight: 900; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; z-index: 5;
        }

    </style>
</head>
<body>

    <div class="lp-wrapper">
        
        <div class="header-section">
            <p class="section-label">Jogos do Dia</p>
            <div class="carousel-container">
                <div class="carousel-track">
                    <div class="game-card">
                        <div class="teams-row">
                            <div class="team"><img src="https://crests.football-data.org/1770.png" alt=""><span>Botafogo</span></div>
                            <div class="vs">VS</div>
                            <div class="team"><img src="Mirassol-SP HD.png" alt=""><span>Athletico</span></div>
                        </div>
                    </div>
                    <div class="game-card">
                        <div class="teams-row">
                            <div class="team"><img src="Internacional.png" alt=""><span>Inter</span></div>
                            <div class="vs">VS</div>
                            <div class="team"><img src="https://crests.football-data.org/1776.png" alt=""><span>São Paulo</span></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <h1 class="headline">BILHETE<br><span style="color: var(--primary)">LIBERADO</span></h1>

        <div class="footer-section">
            <div class="alert-box">
                <p><span>*</span> Entre agora na comunidade, em breve vou mandar uma oportunidade para forrarmos juntos!</p>
            </div>

            <div class="btn-container">
                <a href="https://mais.red/run/ivc-comunidade" class="btn-border-beam">
                    <span class="btn-content">🔥 PEGAR BILHETE</span>
                </a>
            </div>
        </div>

    </div>

</body>
</html>
