<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jota - Oficial</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:ital,wght@1,900&display=swap');
        
        /* VARIAVEIS NOVAS PARA FORÇAR ATUALIZAÇÃO */
        :root { --n-green: #00ff88; --n-black: #000; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html { 
            height: 100%; 
            background: #000; 
            overflow: hidden; 
            font-family: 'Arial', sans-serif; 
        }

        .main-container-v3 {
            position: relative;
            width: 100%;
            height: 100vh;
            /* Diminuí o escurecimento no topo (0.3) para a foto aparecer real */
            background: linear-gradient(rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.9) 80%), 
                        url('jp-direto.jpg') center/cover no-repeat;
        }

        /* JOGOS - BEM NO TOPO */
        .header-games-v3 {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            z-index: 100;
        }

        .game-badge-v3 {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 11px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        /* TEXTO - AGORA ESTÁ EM 75% (BEM BAIXO) */
        .big-title-v3 {
            position: absolute;
            top: 72%; 
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Kanit', sans-serif;
            font-size: clamp(40px, 12vw, 60px);
            line-height: 0.8;
            text-align: center;
            width: 100%;
            font-style: italic;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 2px 2px 20px rgba(0,0,0,1);
        }

        /* RODAPÉ - GRUDADO NO CHÃO */
        .footer-area-v3 {
            position: absolute;
            bottom: 15px; 
            width: 100%;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .warning-box-v3 {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 10px;
            font-size: 12px;
            color: #eee;
            text-align: center;
            margin-bottom: 12px;
            max-width: 340px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* BOTÃO */
        .btn-wrap-v3 { width: 100%; max-width: 340px; }
        
        .neon-border-v3 {
            position: relative; padding: 2px; border-radius: 12px; overflow: hidden; display: block; text-decoration: none;
        }

        .neon-border-v3::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, var(--n-green), transparent);
            animation: spin-v3 3s linear infinite;
        }

        @keyframes spin-v3 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .btn-text-v3 {
            position: relative; background: #000; color: #fff; padding: 18px; border-radius: 10px;
            font-size: 16px; font-weight: 900; text-transform: uppercase; text-align: center; z-index: 5;
        }

    </style>
</head>
<body>

    <div class="main-container-v3">
        
        <div class="header-games-v3">
            <p style="color: var(--n-green); font-size: 10px; letter-spacing: 2px; margin-bottom: 5px; font-weight: bold;">JOGOS DO DIA</p>
            <div class="game-badge-v3">
                ⚽ INTER vs SÃO PAULO
            </div>
        </div>

        <h1 class="big-title-v3">BILHETE<br><span style="color: var(--n-green)">LIBERADO</span></h1>

        <div class="footer-area-v3">
            <div class="warning-box-v3">
                <p><b style="color: var(--n-green)">*</b> Entre na comunidade para forrarmos juntos!</p>
            </div>

            <div class="btn-wrap-v3">
                <a href="https://mais.red/run/ivc-comunidade" class="neon-border-v3">
                    <div class="btn-text-v3">🔥 PEGAR BILHETE</div>
                </a>
            </div>
        </div>

    </div>

</body>
</html>
