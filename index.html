    <style>
        :root {
            --primary: #00ff88;
            --bg: #020202;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
    
        body, html {
            height: 100%;
            background-color: var(--bg);
            color: #fff;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
        }

        /* FUNDO FIXO */
        .lp-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100vh; /* Ocupa exatamente a altura da tela */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; /* Distribui topo, meio e baixo */
            padding: 20px 0;
            background: 
                radial-gradient(circle at center, rgba(2, 2, 2, 0.4) 0%, var(--bg) 95%),
                url('DSC08016.jpg.jpeg') center/cover no-repeat fixed;
        }

        /* SEÇÃO TOPO (CARROSSEL) */
        .header-section { width: 100%; text-align: center; }
        
        .section-label { 
            font-size: 10px; 
            text-transform: uppercase; 
            color: var(--primary); 
            letter-spacing: 3px; 
            margin-bottom: 15px;
            font-weight: bold;
        }

        .carousel-container { display: flex; width: 100%; overflow: hidden; padding-bottom: 10px; }
        .carousel-track { display: flex; gap: 10px; animation: scroll 20s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .game-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            min-width: 150px;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .teams-row { display: flex; align-items: center; justify-content: center; gap: 8px; }
        .team img { width: 28px; height: 28px; object-fit: contain; }
        .team span { font-size: 9px; font-weight: bold; display: block; margin-top: 3px;}
        .vs { font-size: 12px; color: var(--primary); font-weight: 900; }

        /* SEÇÃO MEIO (HEADLINE) - Centralizada automaticamente */
        .headline-container {
            flex-grow: 1; /* Faz esta parte ocupar o espaço que sobrar */
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .headline { 
            font-family: 'Bebas Neue', sans-serif; 
            text-transform: uppercase; 
            line-height: 0.85; 
            font-size: clamp(60px, 15vw, 90px); /* Tamanho de fonte que se ajusta à tela */
        }

        /* SEÇÃO BAIXO (BOTÃO E AVISO) */
        .footer-section { 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 0 20px 20px; 
        }

        .alert-box {
            width: 100%;
            max-width: 360px;
            background: rgba(255, 255, 255, 0.07);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 15px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .alert-box p { font-size: 12px; color: #eee; text-align: center; line-height: 1.4; }
        .alert-box span { color: #ff8800; font-weight: bold; }

        .btn-container { width: 100%; max-width: 360px; animation: pulse 2s infinite; }
        
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }

        .btn-border-beam {
            position: relative; padding: 2px; border-radius: 12px; overflow: hidden; display: block; text-decoration: none;
        }

        .btn-border-beam::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, var(--primary), transparent);
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .btn-content {
            position: relative; 
            background: #00ff88; /* Cor sólida para destaque total no mobile */
            color: #000; 
            padding: 18px; 
            border-radius: 10px;
            font-size: 16px; 
            font-weight: 900; 
            text-transform: uppercase; 
            display: block; 
            z-index: 5; 
            text-align: center;
        }

    </style>
</head>
<body>

    <div class="lp-wrapper">
        
        <div class="header-section">
            <p class="section-label">Jogos do Dia</p>
            <div class="carousel-container">
                <div class="carousel-track">
                    <div class="game-card">
                        <div class="teams-row">
                            <div class="team"><img src="Mirassol-SP HD.png"><span>ATHLETICO</span></div>
                            <div class="vs">X</div>
                            <div class="team"><img src="https://crests.football-data.org/1770.png"><span>BOTAFOGO</span></div>
                        </div>
                    </div>
                    <div class="game-card">
                        <div class="teams-row">
                            <div class="team"><img src="Internacional.png"><span>INTER</span></div>
                            <div class="vs">X</div>
                            <div class="team"><img src="https://crests.football-data.org/1776.png"><span>SÃO PAULO</span></div>
                        </div>
                    </div>
                     <div class="game-card">
                        <div class="teams-row">
                            <div class="team"><img src="https://crests.football-data.org/1765.png"><span>FLU</span></div>
                            <div class="vs">X</div>
                            <div class="team"><img src="https://crests.football-data.org/1779.png"><span>CORINTHIANS</span></div>
                        </div>
                    </div>
                    <div class="game-card">
                        <div class="teams-row">
                            <div class="team"><img src="Mirassol-SP HD.png"><span>ATHLETICO</span></div>
                            <div class="vs">X</div>
                            <div class="team"><img src="https://crests.football-data.org/1770.png"><span>BOTAFOGO</span></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="headline-container">
            <h1 class="headline"> 
                BILHETE<br> 
                <span style="color: var(--primary);">LIBERADO</span> 
            </h1>
        </div>

        <div class="footer-section">
            <div class="alert-box">
                <p><span>*</span> Entre agora na comunidade, em breve vou mandar uma oportunidade para forrarmos juntos!</p>
            </div>
              
            <div class="btn-container">
                <a href="https://mais.red/run/ivc-comunidade" class="btn-border-beam" onclick="trackClick()">
                    <span class="btn-content">🔥 ENTRAR NA COMUNIDADE</span>
                </a>
            </div>
        </div>
    </div>

    <script>
    function trackClick() {
        fbq('track', 'Lead');
    }
    </script>

</body>
</html>
