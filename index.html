<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunidade do Jota</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,900;1,900&display=swap');

        :root { --primary: #00ff88; --bg: #020202; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            overflow: hidden; /* Evita que a tela role */
        }

        .lp-wrapper {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Imagem de fundo com ajuste de brilho */
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('jp-direto.jpg') center/cover no-repeat;
            padding: 20px 0;
        }

        /* 1. TOPO: JOGOS */
        .header-section { width: 100%; text-align: center; margin-bottom: 20px; }
        .section-label { font-size: 11px; color: var(--primary); letter-spacing: 3px; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; }
        
        .carousel-container { display: flex; width: 100%; overflow: hidden; }
        .carousel-track { display: flex; gap: 10px; animation: scroll 20s linear infinite; }
        @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .game-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            min-width: 180px;
            padding: 12px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 2. BLOCO CENTRAL: TUDO JUNTO PARA SUBIR */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Centraliza verticalmente no espaço que sobra */
            align-items: center;
            width: 100%;
            padding: 0 20px;
            margin-top: -20px; /* Puxa todo o bloco para cima */
        }

        .headline { 
            font-family: 'Kanit', sans-serif;
            font-size: 52px; 
            font-weight: 900; 
            font-style: italic;
            text-transform: uppercase; 
            line-height: 0.85;
            text-align: center;
            margin-bottom: 30px; /* Espaço para o aviso abaixo */
        }

        .alert-box {
            width: 100%;
            max-width: 350px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .alert-box p { font-size: 13px; color: #fff; line-height: 1.4; text-align: center; }
        .alert-box span { color: #ffaa00; font-weight: bold; }

        /* 3. BOTÃO */
        .btn-container { width: 100%; max-width: 350px; }
        .btn-border-beam {
            position: relative; padding: 2px; border-radius: 15px; overflow: hidden; display: block; text-decoration: none;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
        }
        .btn-border-beam::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, var(--primary), transparent);
            animation: rotate 3s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .btn-content {
            position: relative; background: #000; color: #fff; padding: 20px; border-radius: 13px;
            font-size: 18px; font-weight: 900; text-transform: uppercase; text-align: center; z-index: 5;
        }

    </style>
</head>
<body>

    <div class="lp-wrapper">
        <div class="header-section">
            <p class="section-label">Jogos do Dia</p>
            <div class="carousel-container">
                <div class="carousel-track">
                    <div class="game-card">
                        <div style="display: flex; justify-content: center; align-items: center; gap: 10px;">
                            <img src="https://crests.football-data.org/1770.png" width="30">
                            <span style="font-size: 12px; font-weight: bold;">VS</span>
                            <img src="https://crests.football-data.org/1776.png" width="30">
                        </div>
                    </div>
                    <div class="game-card">
                        <div style="display: flex; justify-content: center; align-items: center; gap: 10px;">
                            <img src="Internacional.png" width="30">
                            <span style="font-size: 12px; font-weight: bold;">VS</span>
                            <img src="https://crests.football-data.org/1776.png" width="30">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <h1 class="headline">BILHETE<br><span style="color: var(--primary)">LIBERADO</span></h1>

            <div class="alert-box">
                <p><span>*</span> Entre agora na comunidade, em breve vou mandar uma oportunidade para forrarmos juntos!</p>
            </div>

            <div class="btn-container">
                <a href="https://mais.red/run/ivc-comunidade" class="btn-border-beam">
                    <div class="btn-content">🔥 PEGAR BILHETE</div>
                </a>
            </div>
        </div>

    </div>

</body>
</html>
