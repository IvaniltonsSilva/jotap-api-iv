    <style>

        * {

        .lp-container {

            text-align: center;

        }

        .header-top {

            margin-top: 10px;

        }

        #multiplier {

            display: block;

            animation: pulse 1.5s infinite;

        @keyframes pulse {

            margin: 0 auto;

            width: 32px;

            height: 32px;

            border-radius: 50%;

        .proof-text { font-size: 12px; color: #fff; font-weight: bold; }

    <script>

    function animateOdd() {

        const display = document.getElementById('multiplier');

        const oddX = document.querySelector('.odd-x');

        let current = 1.00;

        const target = 100.00;

        const duration = 3500; 

        const startTime = performance.now();



        function update(currentTime) {

            const elapsed = currentTime - startTime;

            const progress = Math.min(elapsed / duration, 1);

            

            const easeOut = 1 - Math.pow(1 - progress, 3);

            current = 1 + (target - 1) * easeOut;



            display.innerText = current.toFixed(2);



            if (current >= 95) {

                display.style.color = "#00ff88"; 

                display.style.textShadow = "0 0 20px rgba(0, 255, 136, 0.8)";

                oddX.style.color = "#00ff88";

            }



            if (progress < 1) {

                requestAnimationFrame(update);

            } else {

                display.innerText = "100.00";

            }

        }

        requestAnimationFrame(update);

    }



    window.onload = animateOdd;



    function trackClick() {

        fbq('track', 'Search');

        fbq('track', 'Subscribe');

        fbq('track', 'Lead');

    </script>
