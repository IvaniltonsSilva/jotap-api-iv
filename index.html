    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            overflow-x: hidden;
        }

        .lp-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            margin: 0 auto;
            position: relative;
            /* Gradiente ajustado para destacar o centro e o topo */
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.9) 100%), url('ChatGPT Image 21 de mar. de 2026, 03_24_17.png');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between; 
            padding: 40px 20px;
            text-align: center;
        }

        .header-top {
            margin-top: 10px;
        }

        .odd-multiplier-box {
            margin-bottom: 5px;
            font-family: 'Arial Black', sans-serif;
        }

        .odd-label {
            font-size: 12px;
            text-transform: uppercase;
            color: #ddd;
            letter-spacing: 1px;
            display: block;
        }

        #multiplier {
            font-size: 60px; 
            font-weight: 900;
            color: #ffffff;
            line-height: 1;
            transition: color 0.3s ease;
        }

        .odd-x {
            color: #ff0000;
            font-size: 35px; 
            transition: color 0.3s ease;
        }

        .headline-text {
            color: #ffffff !important;
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.1;
            margin-top: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
        }

        .bottom-content {
            margin-bottom: 20px;
        }

        .description {
            background-color: transparent; /* TRANSPARENTE CONFORME PEDIDO */
            color: #ffffff !important;
            font-size: 16px;
            font-weight: bold;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            line-height: 1.4;
            text-shadow: 2px 2px 4px rgba(0,0,0,1); /* Sombra para ler no fundo escuro */
        }

        .btn-entrar {
            background-color: #00ff88 !important; 
            color: #000000 !important;           
            text-decoration: none;
            font-size: 20px;
            font-weight: 900;
            padding: 20px;
            border-radius: 12px;
            text-transform: uppercase;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.5); 
            display: block;
            animation: pulse 1.5s infinite;
            margin-bottom: 20px;
            border: none;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.04); }
            100% { transform: scale(1); }
        }

        .social-proof {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 30px;
            width: fit-content;
            margin: 0 auto;
        }

        .avatars img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #fff;
            margin-left: -12px;
        }
        .avatars img:first-child { margin-left: 0; }
        .proof-text { font-size: 12px; color: #fff; font-weight: bold; } 
        
        .highlight-red { color: #ff0000 !important; font-weight: 900; }
    </style>
</head>
