<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comunidade do Jota - Jogos do Dia</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,900;1,900&display=swap');

        :root {
            --primary: #00ff88;
            --bg: #020202;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: #fff;
            overflow-x: hidden;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
        }

        /* FUNDO COM IMAGEM E OVERLAY ESCURO */
        .lp-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px 0 40px 0;
            background: 
                linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                url('jp-direto.jpg') center/cover no-repeat fixed;
        }

        .header-section { width: 100%; text-align: center; }
        
        .section-label { 
            font-size: 14px; 
            text-transform: uppercase; 
            color: var(--primary); 
            letter-spacing: 4px; 
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* CARROSSEL AJUSTADO */
        .carousel-container { display: flex; width: 100%; overflow: hidden; padding: 10px 0; margin-bottom: 20px; }
        .carousel-track { display: flex; gap: 15px; animation: scroll 25s linear infinite; padding-left: 15px; }

        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .game-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            min-width: 200px;
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .teams-row { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .team { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .team img { width: 40px; height: 40px; object-fit: contain; }
        .team span { font-size: 12px; font-weight: bold; }
        .vs { font-weight: 900; color: var(--primary); font-size: 14px; margin: 0 5px; }

        /* HEADLINE - CENTRALIZADA E COM RESPIRO */
        .headline { 
            font-family: 'Kanit', sans-serif;
            font-size: clamp(40px, 12vw, 55px); 
            font-weight: 900; 
            font-style: italic;
            text-transform: uppercase; 
            margin: 40px 0;
            line-height: 0.9;
            text-align: center;
            text-shadow: 0 0 20px rgba(0,0,0,1);
        }

        /* FOOTER E BOTÃO - SUBIR O CONJUNTO */
        .footer-section { 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 0 20px;
            margin-top: auto; /* Garante que fique na parte de baixo, mas com padding */
        }

        .alert-box {
            width: 100%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .alert-box p { font-size: 13px; color: #eee; line-height: 1.4; text-align: center; }
        .alert-box span { color: #ffaa00; font-weight: bold; }

        .btn-container { width: 100%; max-width: 380px; }

        .btn-border-beam {
            position: relative; padding: 2px; border-radius: 18px; overflow: hidden; display: block; text-decoration: none;
        }

        /* ANIMAÇÃO DE BORDA VERDE */
        .btn-border-beam::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, var(--primary), transparent);
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .btn-content {
            position: relative; background: #111; color: #fff; padding: 22px; border-radius: 16px;
            font-size: 18px; font-weight: 900; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 10px; z-index: 5;
        }

    </style>
</head>
<body>

    <div class="lp-wrapper">
        
        <div class="header-section">
            <p class="section-label">Jogos do Dia</p>
            
            <div class="carousel-container">
                <div class="carousel-track">
                    <div class="game-card">
                        <div class="teams-row">
                            <div class="team"><img src="https://crests.football-data.org/1770.png" alt=""><span>Botafogo</span></div>
                            <div class="vs">VS</div>
                            <div class="team"><img src="Mirassol-SP HD.png" alt=""><span>Athletico</span></div>
                        </div>
                    </div>
                    <div class="game-card">
                        <div class="teams-row">
                            <div class="team"><img src="Internacional.png" alt=""><span>Inter</span></div>
                            <div class="vs">VS</div>
                            <div class="team"><img src="https://crests.football-data.org/1776.png" alt=""><span>São Paulo</span></div>
                        </div>
                    </div>
                    <div class="game-card">
                        <div class="teams-row">
                            <div class="team"><img src="https://crests.football-data.org/1770.png" alt=""><span>Botafogo</span></div>
                            <div class="vs">VS</div>
                            <div class="team"><img src="Mirassol-SP HD.png" alt=""><span>Athletico</span></div>
                        </div>
                    </div>
                </div>
            </div>

            <h1 class="headline">BILHETE<br><span style="color: var(--primary)">LIBERADO</span></h1>
        </div>

        <div class="footer-section">
            <div class="alert-box">
                <p><span>*</span> Entre agora na comunidade, em breve vou mandar uma oportunidade para forrarmos juntos!</p>
            </div>

            <div class="btn-container">
                <a href="https://mais.red/run/ivc-comunidade" class="btn-border-beam">
                    <span class="btn-content">🔥 PEGAR BILHETE</span>
                </a>
            </div>
        </div>

    </div>

</body>
</html>
